<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SellerFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      background: #fff;
      color: #1a1a1a;
    }
    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .content { padding: 20px; }

    /* Login form */
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      margin-top: 8px;
      font-size: 13px;
    }
    .btn-danger { background: #fee2e2; color: #dc2626; margin-top: 8px; font-size: 13px; }

    /* Logged-in state */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-text { font-size: 12px; color: #166534; font-weight: 500; word-break: break-all; }

    .error { color: #dc2626; font-size: 12px; margin-top: 8px; display: none; }
    .spinner { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>SellerFlow</h1>
    <p>Your Instagram & WhatsApp CRM</p>
  </div>

  <div class="content">
    <!-- Login view -->
    <div id="login-view">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" id="login-btn">Login</button>
      <p class="error" id="login-error"></p>
    </div>

    <!-- Logged-in view -->
    <div id="connected-view" style="display:none;">
      <div class="status-badge">
        <div class="dot"></div>
        <span class="status-text" id="user-email-display"></span>
      </div>
      <button class="btn btn-primary" id="dashboard-btn">Open Dashboard</button>
      <button class="btn btn-danger" id="logout-btn">Logout</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
